apply_settings:
  name: Apply settings
  description: Apply Deye work mode, max sell power, battery discharge current and optional charge current.
  fields:
    mode:
      required: true
      selector:
        select:
          options:
            - Selling First
            - Zero Export To Load
            - Zero Export To CT
    sell_power:
      required: true
      selector:
        number:
          min: 0
          max: 13000
          step: 100
          unit_of_measurement: W
    discharge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
    charge_current:
      required: false
      description: Po pominięciu używany jest prąd zapisany w Ustawieniach domyślnych.
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
manual_sell:
  name: Manual sell
  description: Switch to Selling First and set manual export limits.
  fields:
    sell_power:
      required: true
      selector:
        number:
          min: 0
          max: 13000
          step: 100
          unit_of_measurement: W
    discharge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
charge_now:
  name: Charge now
  description: Start battery charging by setting the configured charge current.
  fields:
    charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
stop_selling:
  name: Stop selling
  description: Zatrzaśnij sterowanie managera, zastosuj 1:1 pełny zestaw z Ustawień domyślnych i nie zeruj automatycznie wartości liczbowych.
restore_defaults:
  name: Restore defaults
  description: Ręcznie zastosuj ustawienia zapisane przez użytkownika w oknie Ustawienia domyślne.
resume_manager:
  name: Włącz Manager i harmonogram
  description: "Świadomie włącza tryb Schedule i Scheduler po Stop Sell lub zatrzymaniu awaryjnym. Nie zmienia wspólnego profilu Charge; tylko Ładowanie z sieci: TAK w tym profilu zezwala na fizyczne Grid Charge."
emergency_stop:
  name: Emergency stop
  description: Natychmiast zatrzaśnij sterowanie managera i zastosuj 1:1 pełny zestaw ustawień domyślnych użytkownika, włącznie z wybranym trybem.
rate_ai_analysis:
  name: Oceń sugestię AI
  description: Zapisuje ocenę wybranej sugestii AI.
  fields:
    timestamp:
      required: true
      selector:
        number:
    rating:
      required: true
      selector:
        number:
          min: 1
          max: 5
          step: 1
clear_history:
  name: Wyczyść historię i dane
  description: Usuwa historię sugestii, uczenia i porównań Solcast.
apply_schedule_patch:
  name: Apply schedule patch
  description: Atomically validate and apply multiple 24-hour schedule slot changes. Intended for the bundled dashboard card.
  fields:
    data:
      required: true
      selector:
        text:
          multiline: true
save_tariff_settings:
  name: Zapisz ustawienia taryfy i dystrybucji
  description: Waliduje i zapisuje ustawienia operatora OSD, taryfy, źródła cen i znaków przepływu przekazane przez kartę.
  fields:
    data:
      required: true
      selector:
        text:
          multiline: true
save_charge_profile:
  name: Zapisz ustawienia ładowania
  description: Zapisuje pełny profil używany wyłącznie przez sloty harmonogramu w trybie Charge.
  fields:
    grid_charge_enabled:
      required: true
      description: "Ładowanie z sieci: TAK zezwala wspólnemu profilowi Charge włączyć Grid Charge w fizycznym TOU Deye; NIE zawsze pozostawia je wyłączone. Dodatni prąd nie jest zgodą na ładowanie z sieci."
      selector:
        boolean:
    charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
    discharge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
    grid_charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
    target_soc:
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
save_default_settings:
  name: Zapisz ustawienia domyślne falownika
  description: Zapisuje pełen stan powrotu użytkownika bez natychmiastowego zapisu do falownika. Jest stosowany tylko świadomie albo po błędzie sterowania.
  fields:
    mode:
      required: true
      selector:
        select:
          options:
            - Selling First
            - Zero Export To Load
            - Zero Export To CT
    sell_power:
      required: true
      selector:
        number:
          min: 0
          max: 13000
          step: 1
          unit_of_measurement: W
    discharge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 1
          unit_of_measurement: A
    charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 1
          unit_of_measurement: A
    grid_charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 1
          unit_of_measurement: A
refresh_tariff_catalog:
  name: Odśwież katalog taryf OSD
  description: Sprawdza wersjonowany katalog taryf. W razie błędu zachowuje ostatnią poprawną lub wbudowaną wersję.
save_future_plan:
  name: Zapisz plan AI na jutro
  description: Zapisuje datowany, ręcznie zatwierdzony plan na jutro bez natychmiastowej zmiany powtarzalnego harmonogramu Deye.
  fields:
    data:
      name: Plan JSON
      description: Data planu, wybrane godziny i dokładne wartości zaakceptowane przez użytkownika.
      required: true
      selector:
        text:
          multiline: true
cancel_future_plan:
  name: Anuluj plan AI na jutro
  description: Anuluje oczekujący plan na jutro. Nie zmienia bieżącego harmonogramu.
