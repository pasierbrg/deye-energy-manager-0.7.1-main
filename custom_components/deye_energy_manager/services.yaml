apply_settings:
  name: Zastosuj ustawienia
  description: Zastosuj tryb pracy Deye, maksymalną moc sprzedaży, prąd rozładowania i opcjonalnie prąd ładowania.
  fields:
    mode:
      required: true
      selector:
        select:
          options:
            - Selling First
            - Zero Export To Load
            - Zero Export To CT
    sell_power:
      required: true
      selector:
        number:
          min: 0
          max: 13000
          step: 100
          unit_of_measurement: W
    discharge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
    charge_current:
      required: false
      description: Po pominięciu używany jest prąd zapisany w Ustawieniach domyślnych.
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
    grid_charge_current:
      required: false
      description: Po pominięciu używany jest prąd ładowania z sieci zapisany w Ustawieniach domyślnych. Dodatnia wartość nie włącza automatycznie Grid Charge; jest wyłącznie limitem prądu.
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
manual_sell:
  name: Ręczna sprzedaż
  description: Przełącz na Selling First i ustaw ręczne limity sprzedaży.
  fields:
    sell_power:
      required: true
      selector:
        number:
          min: 0
          max: 13000
          step: 100
          unit_of_measurement: W
    discharge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
charge_now:
  name: Ładowanie teraz
  description: Rozpocznij ładowanie baterii zapisanym prądem ładowania.
  fields:
    charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
stop_selling:
  name: Zatrzymaj sprzedaż
  description: Zatrzaśnij sterowanie managera, zastosuj 1:1 pełny zestaw z Ustawień domyślnych i nie zeruj automatycznie wartości liczbowych.
restore_defaults:
  name: Przywróć ustawienia domyślne
  description: Ręcznie zastosuj ustawienia zapisane przez użytkownika w oknie Ustawienia domyślne.
resume_manager:
  name: Włącz Manager i harmonogram
  description: "Świadomie włącza tryb Schedule i Scheduler po Stop Sell lub zatrzymaniu awaryjnym. Nie zmienia szablonu ani istniejących slotów Charge; tylko Ładowanie z sieci: TAK w konkretnym slocie Charge zezwala na fizyczne Grid Charge."
emergency_stop:
  name: Zatrzymanie awaryjne
  description: Natychmiast zatrzaśnij sterowanie managera i zastosuj 1:1 pełny zestaw ustawień domyślnych użytkownika, włącznie z wybranym trybem.
save_ai_settings:
  name: Zapisz ustawienia AI
  description: Zapisuje ustawienia używane przez okno Sugestie AI.
  fields:
    data:
      name: Dane JSON
      description: Ustawienia strategii, progów i parametrów planowania przekazane przez kartę.
      required: true
      selector:
        text:
          multiline: true
save_ai_analysis:
  name: Zapisz analizę AI
  description: Zapisuje porównanie planu AI z rzeczywistą produkcją i cenami.
  fields:
    data:
      name: Dane JSON
      description: Datowana analiza wygenerowana przez okno Sugestie AI.
      required: true
      selector:
        text:
          multiline: true
clear_ai_history:
  name: Wyczyść historię AI
  description: Usuwa historię analiz i sugestii AI.
rate_ai_analysis:
  name: Oceń sugestię AI
  description: Zapisuje ocenę wybranej sugestii AI.
  fields:
    timestamp:
      required: true
      selector:
        number:
    rating:
      required: true
      selector:
        number:
          min: 1
          max: 5
          step: 1
clear_history:
  name: Wyczyść historię i dane
  description: Usuwa historię sugestii, uczenia i porównań Solcast.
apply_schedule_patch:
  name: Zastosuj łatę harmonogramu
  description: Atomowo waliduje i zastosowuje wielokrotne zmiany slotów 24-godzinnego harmonogramu. Przeznaczone dla dołączonej karty dashboardu.
  fields:
    data:
      required: true
      selector:
        text:
          multiline: true
save_tariff_settings:
  name: Zapisz ustawienia taryfy i dystrybucji
  description: Waliduje i zapisuje ustawienia operatora OSD, taryfy, źródła cen i znaków przepływu przekazane przez kartę.
  fields:
    data:
      required: true
      selector:
        text:
          multiline: true
save_charge_profile:
  name: Zapisz ustawienia ładowania
  description: Zapisuje szablon kopiowany przy późniejszym wyborze trybu Charge. Nie nadpisuje istniejących slotów harmonogramu.
  fields:
    grid_charge_enabled:
      required: true
      description: "Wartość początkowa kopiowana do nowego slotu Charge. Po skopiowaniu tylko Ładowanie z sieci: TAK zapisane w konkretnym slocie Charge zezwala na fizyczne Grid Charge; dodatni prąd nie jest zgodą."
      selector:
        boolean:
    charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
    discharge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
    grid_charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: A
    target_soc:
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
save_normal_profile:
  name: Zapisz ustawienia normalnej pracy
  description: Zapisuje szablon kopiowany przy późniejszym wyborze trybu Normalna Praca. Nie nadpisuje istniejących slotów Normalna Praca.
  fields:
    physical_work_mode:
      required: true
      description: Fizyczny tryb Deye wysyłany do select.deye_inverter_system_work_mode dla slotów Normalna Praca.
      selector:
        select:
          options:
            - Zero Export To Load
            - Zero Export To CT
    sell_power:
      required: true
      selector:
        number:
          min: 0
          max: 13000
          step: 1
          unit_of_measurement: W
    discharge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 1
          unit_of_measurement: A
    charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 1
          unit_of_measurement: A
    grid_charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 1
          unit_of_measurement: A
    tou_soc:
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
save_default_settings:
  name: Zapisz ustawienia domyślne falownika
  description: Zapisuje pełen stan powrotu użytkownika bez natychmiastowego zapisu do falownika. Jest stosowany tylko świadomie albo po błędzie sterowania.
  fields:
    mode:
      required: true
      selector:
        select:
          options:
            - Selling First
            - Zero Export To Load
            - Zero Export To CT
    sell_power:
      required: true
      selector:
        number:
          min: 0
          max: 13000
          step: 1
          unit_of_measurement: W
    discharge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 1
          unit_of_measurement: A
    charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 1
          unit_of_measurement: A
    grid_charge_current:
      required: true
      selector:
        number:
          min: 0
          max: 240
          step: 1
          unit_of_measurement: A
refresh_tariff_catalog:
  name: Odśwież katalog taryf OSD
  description: Sprawdza wersjonowany katalog taryf. W razie błędu zachowuje ostatnią poprawną lub wbudowaną wersję.
save_future_plan:
  name: Zapisz plan AI na jutro
  description: Zapisuje datowany, ręcznie zatwierdzony plan na jutro bez natychmiastowej zmiany powtarzalnego harmonogramu Deye.
  fields:
    data:
      name: Plan JSON
      description: Data planu, wybrane godziny i dokładne wartości zaakceptowane przez użytkownika.
      required: true
      selector:
        text:
          multiline: true
cancel_future_plan:
  name: Anuluj plan AI na jutro
  description: Anuluje oczekujący plan na jutro. Nie zmienia bieżącego harmonogramu.
